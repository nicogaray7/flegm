youtube_api_key: "${YOUTUBE_API_KEY}"

# Supabase credentials (found at https://app.supabase.com → Project Settings → API)
supabase_url: "${SUPABASE_URL}"
supabase_anon_key: "${SUPABASE_ANON_KEY}"

# Bot account credentials
# Option 1 (recommandé pour le bot CLI) : service key + user_id fixe (FLEGM_BOT_USER_ID)
# Option 2 : email+password (Auth), si configuré
flegm_bot_email: "${FLEGM_BOT_EMAIL}"
flegm_bot_password: "${FLEGM_BOT_PASSWORD}"
flegm_bot_user_id: "${FLEGM_BOT_USER_ID}"

llm_provider: "anthropic"          # "anthropic" | "openai"
llm_api_key: "${LLM_API_KEY}"
llm_model: "claude-3-haiku-20240307"

rss_interval_minutes: 60
publish_delay_seconds: 3
initial_popular_count: 5
initial_recent_count: 5
